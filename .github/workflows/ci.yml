# .github/workflows/ci.yml
# Workflow de Integração Contínua para o Projeto AgroKongo

name: AgroKongo CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache de dependências Pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint com flake8
      run: |
        # Para a execução se houver erros de linting, mas ignora alguns erros comuns.
        # E501: linha muito longa (gerido por formatadores como black)
        # W503: quebra de linha antes de operador binário
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Executar testes com pytest
      env:
        FLASK_ENV: testing
        # Usa um banco de dados SQLite em memória para os testes de CI
        DATABASE_URL: "sqlite:///:memory:"
        SECRET_KEY: "ci-secret-key"
        WTF_CSRF_ENABLED: "False" # Desativa CSRF para facilitar os testes de API
      run: |
        pytest
