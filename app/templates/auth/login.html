{% extends "base.html" %}

{% block title %}Entrar - AgroKongo{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
            <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 1rem;">
                <div class="row g-0">
                    <!-- Coluna da Imagem (visível em desktop) -->
                    <div class="col-md-6 d-none d-md-block">
                        <img src="{{ url_for('static', filename='img/login-bg.jpg') }}"
                             class="img-fluid h-100"
                             style="object-fit: cover; object-position: center;"
                             alt="Agricultor angolano a trabalhar no campo"
                             onerror="this.style.display='none'">
                    </div>

                    <!-- Coluna do Formulário -->
                    <div class="col-md-6 d-flex flex-column justify-content-center p-4 p-lg-5">
                        <div class="text-center text-md-start mb-4">
                            <a href="{{ url_for('main.index') }}" class="text-decoration-none text-agro h4 font-brand fw-800">
                                <i class="fas fa-leaf me-1"></i>AgroKongo
                            </a>
                            <h3 class="fw-bold mt-3">Bem-vindo de volta!</h3>
                            <p class="text-muted small">Aceda à sua conta para continuar.</p>
                        </div>

                        <form action="{{ url_for('auth.login') }}" method="POST" id="loginForm">
                            {{ form.hidden_tag() if form else '' }}
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <!-- Campo Telemóvel -->
                            <div class="mb-3">
                                <label for="telemovel" class="form-label small fw-bold">Telemóvel</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-phone-alt text-muted"></i></span>
                                    <input type="tel" name="telemovel" id="telemovel" class="form-control border-start-0"
                                           placeholder="9XX XXX XXX" required autofocus>
                                </div>
                            </div>

                            <!-- Campo Senha -->
                            <div class="mb-3">
                                <label for="senha" class="form-label small fw-bold">Palavra-passe</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" name="senha" id="senha" class="form-control border-start-0"
                                           placeholder="••••••••" required>
                                </div>
                            </div>

                            <!-- Opções (Lembrar e Esqueci a senha) -->
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="lembrar" id="lembrar">
                                    <label class="form-check-label small" for="lembrar">
                                        Manter sessão
                                    </label>
                                </div>
                                <a href="#" class="small text-decoration-none">Esqueceu a senha?</a>
                            </div>

                            <!-- Botão de Submissão -->
                            <div class="d-grid">
                                <button type="submit" id="submitBtn" class="btn btn-agro btn-lg fw-bold">
                                    Entrar
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4 pt-3 border-top">
                            <p class="small text-muted">
                                Novo na AgroKongo? <a href="{{ url_for('auth.registo') }}" class="fw-bold text-decoration-none">Crie uma conta gratuita</a>.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');

    if (loginForm) {
        loginForm.addEventListener('submit', function() {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> A verificar...';
        });
    }
});
</script>
{% endblock %}
