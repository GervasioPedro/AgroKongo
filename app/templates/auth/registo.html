{% extends "base.html" %}

{% block title %}Criar Conta - AgroKongo{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-9">
            
            <div class="card border-0 shadow-lg overflow-hidden animate__animated animate__fadeIn" style="border-radius: 1.5rem;">
                <div class="row g-0">
                
                    
                    <div class="col-md-5 d-none d-md-block position-relative">
                        <img src="{{ url_for('static', filename='img/login-bg.jpg') }}" class="img-fluid h-100 w-100"
                            style="object-fit: cover; min-height: 500px;" alt="Agricultura em Angola" onerror="this.style.display='none'">

                        <div class="position-absolute top-0 start-0 w-100 h-100"
                            style="background: linear-gradient(135deg, rgba(22, 163, 74, 0.4), rgba(20, 83, 45, 0.7));">
                            <div
                                class="d-flex flex-column h-100 justify-content-center align-items-center text-white p-4 text-center">
                                <i class="fas fa-leaf fa-3x mb-3"></i>
                                <h4 class="fw-bold font-brand">AgroKongo</h4>
                                <p class="small opacity-75">Unindo o campo ao mercado digital.</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-7 bg-white p-4 p-lg-5" style="z-index: 3;">
                        <div class="mb-4">
                            <h2 class="fw-800 font-brand text-dark mb-1">Criar Conta</h2>
                            <p class="text-secondary small">Junte-se à maior rede agrícola de Angola.</p>
                        </div>

                        <form action="{{ url_for('auth.registo') }}" method="POST" id="registoForm">
                            {{ form.hidden_tag() if form else '' }}
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted">Eu pretendo:</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check custom-option w-100">
                                        <input class="form-check-input d-none" type="radio" name="tipo" id="tipo_comprador" value="comprador" checked>
                                        <label class="form-check-label d-block p-3 border rounded-3 text-center cursor-pointer" for="tipo_comprador">
                                            <i class="fas fa-shopping-basket d-block mb-1"></i> Comprar
                                        </label>
                                    </div>
                                    <div class="form-check custom-option w-100">
                                        <input class="form-check-input d-none" type="radio" name="tipo" id="tipo_produtor" value="produtor">
                                        <label class="form-check-label d-block p-3 border rounded-3 text-center cursor-pointer" for="tipo_produtor">
                                            <i class="fas fa-seedling d-block mb-1"></i> Vender
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Nome Completo</label>
                                <div class="input-group border rounded-3 overflow-hidden shadow-sm">
                                    <span class="input-group-text bg-white border-0"><i class="fas fa-user text-agro"></i></span>
                                    <input type="text" name="nome" class="form-control border-0 py-2" placeholder="Ex: António Queirós" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Telemóvel</label>
                                <div class="input-group border rounded-3 overflow-hidden shadow-sm">
                                    <span class="input-group-text bg-white border-0"><i class="fas fa-phone-alt text-agro"></i></span>
                                    <input type="tel" name="telemovel" class="form-control border-0 py-2" placeholder="923 000 000" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted">Palavra-passe</label>
                                <div class="input-group border rounded-3 overflow-hidden shadow-sm">
                                    <span class="input-group-text bg-white border-0"><i class="fas fa-lock text-agro"></i></span>
                                    <input type="password" name="senha" class="form-control border-0 py-2" placeholder="Mínimo 6 caracteres" required minlength="6">
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="termos" required>
                                    <label class="form-check-label small text-muted" for="termos">
                                        Aceito os <a href="#" class="text-agro fw-bold">Termos e Condições</a>.
                                    </label>
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" id="submitBtn" class="btn btn-agro btn-lg fw-bold py-3 shadow-sm">
                                    Registar Agora
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="small text-muted">Já tem conta? <a href="{{ url_for('auth.login') }}" class="text-agro fw-bold text-decoration-none">Entrar</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .cursor-pointer { cursor: pointer; }
    .custom-option input:checked + label {
        border-color: var(--agro-green) !important;
        background-color: rgba(22, 163, 74, 0.05);
        color: var(--agro-green);
        font-weight: bold;
    }
    .input-group:focus-within { border-color: var(--agro-green) !important; }
    .text-agro { color: var(--agro-green); }
</style>
{% endblock %}
