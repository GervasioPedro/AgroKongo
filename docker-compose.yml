version: '3.8'

services:
  web:
    build: .
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://agrokongo:${DB_PASSWORD:-senha_segura}@db:5432/agrokongo
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data_storage:/app/data_storage
    command: gunicorn -w 4 -b 0.0.0.0:5000 run:app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=agrokongo
      - POSTGRES_USER=agrokongo
      - POSTGRES_PASSWORD=${DB_PASSWORD:-senha_segura}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrokongo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  celery_worker:
    build: .
    restart: always
    command: celery -A run.celery worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://agrokongo:${DB_PASSWORD:-senha_segura}@db:5432/agrokongo
    depends_on:
      - redis
      - db
    volumes:
      - ./data_storage:/app/data_storage

volumes:
  postgres_data: