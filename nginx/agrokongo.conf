server {
    listen 80;
    server_name localhost; # Em produção, substitui pelo teu domínio

    client_max_body_size 16M; # Limite para fotos de comprovativos

    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Servir ficheiros estáticos diretamente (Imagens de Safras e Perfil)
    location /data_storage/public/ {
        alias /app/data_storage/public/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /static/ {
        alias /app/app/static/;
        expires 7d;
    }
}