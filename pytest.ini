[tool:pytest]
# Configuração do pytest para testes do AgroKongo

# Diretórios de testes
testpaths = tests tests_framework

# Padrões de arquivo
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Opções de execução
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# Markers personalizados
markers =
    unit: Testes unitários (lógica isolada)
    integration: Testes de integração (múltiplos componentes)
    e2e: Testes end-to-end (fluxo completo)
    slow: Testes que demoram mais de 1 segundo
    database: Testes que requerem banco de dados
    financial: Testes de cálculos financeiros
    stock: Testes de gestão de stock
    dispute: Testes de sistema de disputas
    security: Testes de segurança

# Configuração de cobertura
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout para testes lentos
timeout = 300
timeout_method = thread
