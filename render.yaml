services:
  # 1. Backend API (Flask + Gunicorn)
  - type: web
    name: agrokongo-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn run:app --workers 2 --threads 4 --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
        sync: true
      - key: CORS_ORIGINS
        value: https://agrokongo.netlify.app,https://www.agrokongo.ao
      # Redis interno do Render
      - key: REDIS_URL
        fromService:
          name: agrokongo-redis
          type: redis
          property: connectionString
      # Variáveis que VOCÊ deve preencher no Dashboard do Render:
      - key: DATABASE_URL
        sync: false # Cole aqui a string do Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # 2. Celery Worker (Processamento de Fundo)
  - type: worker
    name: agrokongo-worker
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A celery_worker.celery worker --loglevel=info --concurrency=2"
    envVars:
      - key: REDIS_URL
        fromService:
          name: agrokongo-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        sync: false # O Render vai pedir para preencher isto igual à API

  # 3. Celery Beat (Tarefas Agendadas)
  - type: worker
    name: agrokongo-beat
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A celery_worker.celery beat --loglevel=info"
    envVars:
      - key: REDIS_URL
        fromService:
          name: agrokongo-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        sync: false

# Serviços de Dados (Apenas Redis, pois DB é Supabase)
databases:
  - name: agrokongo-redis
    type: redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Aberto apenas para serviços internos
