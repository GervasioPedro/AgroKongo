services:
  # Backend API (Servidor Web Gunicorn)
  - type: web
    name: agrokongo-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn run:app --workers 2 --threads 4 --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: agrokongo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
        sync: true # Sincronizar a chave entre deploys
      - key: REDIS_URL
        fromService:
          name: agrokongo-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: https://agrokongo.netlify.app,https://www.agrokongo.ao
      # --- ADICIONE ESTAS VARIÁVEIS NO DASHBOARD DO RENDER ---
      - key: MAIL_SERVER
        value: "smtp.example.com" # Substituir
      - key: MAIL_PORT
        value: "587" # Substituir
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USERNAME
        value: "seu_email@example.com" # Substituir
      - key: MAIL_PASSWORD
        sync: false # Manter segredos fora do YAML
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: SUPABASE_BUCKET
        value: "agrokongo-uploads"
      - key: SUPABASE_PUBLIC_URL
        sync: false

  # Celery Worker (Processa tarefas assíncronas)
  - type: worker
    name: agrokongo-worker
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A celery_worker.celery worker --loglevel=info --concurrency=2"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrokongo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agrokongo-redis
          type: redis
          property: connectionString

  # Celery Beat (Agenda tarefas periódicas)
  - type: worker
    name: agrokongo-beat
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A celery_worker.celery beat --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrokongo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agrokongo-redis
          type: redis
          property: connectionString

databases:
  - name: agrokongo-db
    databaseName: agrokongo
    user: agrokongo
    region: frankfurt
    plan: free

  - name: agrokongo-redis
    type: redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru
