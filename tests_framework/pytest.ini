# pytest.ini - Configuração do pytest para tests_framework
# Otimização e organização dos testes do AgroKongo

[tool:pytest]
# Diretório base dos testes
testpaths = tests_framework

# Padrão de nomes dos arquivos de teste
python_files = test_*.py *_test.py

# Padrão de nomes das classes de teste
python_classes = Test*

# Padrão de nomes das funções de teste
python_functions = test_*

# Mínimo de versão do Python
minversion = 3.8

# Opções de adição
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10
    --maxfail=5
    --cov=app
    --cov-report=html:tests_framework/htmlcov
    --cov-report=xml:tests_framework/coverage.xml
    --cov-report=term-missing
    --cov-fail-under=80
    --junit-xml=tests_framework/junit.xml

# Marcadores personalizados
markers =
    unit: Testes unitários isolados que não dependem de recursos externos
    integration: Testes de integração entre componentes
    e2e: Testes end-to-end completos que simulam fluxos reais
    financial: Testes relacionados a fluxos financeiros
    security: Testes de segurança e validações
    performance: Testes de performance e carga
    slow: Testes lentos que requerem mais tempo
    database: Testes que requerem acesso ao banco de dados
    api: Testes de endpoints da API
    celery: Testes relacionados a tarefas Celery

# Filtragem de avisos
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning

# Configuração de logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Configuração de captura de output
capture_fd = false

# Timeout para testes lentos
timeout = 300
timeout_method = thread

# Paralelização (se disponível)
# addopts = -n auto

# Configuração específica para Windows
console_output_style = progress

# Configuração de coverage
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */venv/*
    */env/*
    */__pycache__/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

show_missing = true
precision = 2

[coverage:html]
directory = tests_framework/htmlcov

# Configuração para relatórios JUnit
[junit-xml]
family = xunit2
