# pytest_simple.ini - Configuração simplificada do pytest
# Versão corrigida para evitar erros de parsing

[tool:pytest]
# Diretório base dos testes
testpaths = .

# Padrão de nomes dos arquivos de teste
python_files = test_*.py *_test.py

# Padrão de nomes das classes de teste
python_classes = Test*

# Padrão de nomes das funções de teste
python_functions = test_*

# Mínimo de versão do Python
minversion = 3.8

# Opções de adição
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10
    --maxfail=5

# Marcadores personalizados
markers =
    unit: Testes unitários isolados
    integration: Testes de integração
    e2e: Testes end-to-end
    financial: Testes financeiros
    security: Testes de segurança
    performance: Testes de performance
    slow: Testes lentos
    database: Testes de banco
    api: Testes de API
    celery: Testes Celery

# Filtragem de avisos
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning

# Configuração de logging
log_cli = true
log_cli_level = INFO

# Configuração específica para Windows
console_output_style = progress
